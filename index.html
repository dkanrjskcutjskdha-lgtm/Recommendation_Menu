<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>오늘 뭐 먹지?</title>
    <style>
        :root {
            --primary: #FF6B6B;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 40px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            text-align: center;
        }

        h1 {
            font-size: 34px;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .panel {
            background: rgba(241, 243, 245, 0.5);
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            font-size: 15px;
            font-weight: 700;
            display: block;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #ddd;
            margin-bottom: 10px;
            box-sizing: border-box;
            font-size: 16px !important;
            transform: translateZ(0);
        }

        button {
            width: 100%;
            padding: 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 19px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(255, 107, 107, 0.35);
        }

        button:active { transform: scale(0.95); }

        #result {
            margin-top: 25px;
            font-weight: bold;
            font-size: 20px;
            color: #ff6b6b;
        }

        #results {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
        }

        .card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            width: 280px;
            box-shadow: 0 2px 12px rgba(0,0,0,.1);
            transition: transform 0.2s;
            cursor: pointer;
        }
        .card:hover { transform: translateY(-4px); }

        .img-wrap { width: 100%; height: 200px; background: #e0e0e0; position: relative; overflow: hidden; }

        .card-img {
            width: 100%; height: 200px; object-fit: cover; display: block;
            transition: opacity 0.3s ease, transform 0.35s ease;
            background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
        }
        .card-img:hover { transform: scale(1.04); }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .img-overlay {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 2rem 0.85rem 0.6rem;
            background: linear-gradient(to top, rgba(0,0,0,0.68) 0%, transparent 100%);
            display: flex; justify-content: space-between; align-items: flex-end;
            pointer-events: none;
        }
        .overlay-name { color: #fff; font-size: 1.05rem; font-weight: 700; text-shadow: 0 1px 5px rgba(0,0,0,0.5); }
        .overlay-hint { color: rgba(255,255,255,0.65); font-size: 0.65rem; white-space: nowrap; }

        .img-fallback {
            width: 100%; height: 200px;
            background: linear-gradient(135deg, #f0f0f0 0%, #e0e0e0 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 0.4rem; font-size: 1.1rem; color: #aaa; font-weight: 600;
        }
        .img-fallback::before { content: "🍽"; font-size: 2rem; }

        .card-body { padding: 0.85rem 1rem 1rem; text-align: left; }
        .card-body h3 { font-size: 1.1rem; font-weight: 700; color: #1a1a1a; margin-bottom: 0.45rem; }

        .badge { display: inline-block; padding: 0.2rem 0.55rem; border-radius: 20px; font-size: 0.75rem; margin: 0.15rem 0.1rem; }
        .badge.cuisine { background: #eaf4ff; color: #2980b9; }
        .badge.tag { background: #fef9e7; color: #b7950b; }
    </style>
</head>
<body>
    <div class="container">
        <h1>오늘 뭐 먹지?</h1>
        <p style="color:#888; font-size:14px;">날씨·식사 기록 기반 추천</p>

        <div class="panel">
            <div id="weather-info" style="font-size:13px; color:#666;">날씨 불러오는 중...</div>
        </div>

        <div class="panel">
            <div class="input-group">
                <label>1. 최근 식사</label>
                <input id="meal1" type="text" placeholder="예: 김치찌개">
                <label>2. 그 전 식사</label>
                <input id="meal2" type="text" placeholder="예: 제육볶음">
            </div>
        </div>

        <button onclick="pickMenu()">오늘의 메뉴 추천받기</button>
        <div id="result"></div>
        <div id="results" style="margin-top:20px;"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
